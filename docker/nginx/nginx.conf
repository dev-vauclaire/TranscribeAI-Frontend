server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    location /assets/ {
        try_files $uri =404;
        access_log off;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location = /env.js {
        try_files $uri =404;
        add_header Cache-Control "no-store";
    }

    location = /favicon.svg {
        try_files $uri =404;
        access_log off;
    }

    location = /logo.svg {
        try_files $uri =404;
        access_log off;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}