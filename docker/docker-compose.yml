services:
  frontend:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: transcribeai-frontend
    ports:
      - "8080:80"
    environment:
      VITE_APP_API_KEY: "${VITE_APP_API_KEY}"
      VITE_APP_MAX_SIZE_AUDIO_BATCH: "${VITE_APP_MAX_SIZE_AUDIO_BATCH}"
      VITE_APP_MAX_TIME_PROCESSING_BATCH: "${VITE_APP_MAX_TIME_PROCESSING_BATCH}"
      VITE_APP_TIME_BETWEEN_EACH_POLLING_BATCH: "${VITE_APP_TIME_BETWEEN_EACH_POLLING_BATCH}"
      VITE_APP_MAX_SIZE_AUDIO_DIARIZATION: "${VITE_APP_MAX_SIZE_AUDIO_DIARIZATION}"
      VITE_APP_MAX_TIME_PROCESSING_DIARIZATION: "${VITE_APP_MAX_TIME_PROCESSING_DIARIZATION}"
      VITE_APP_TIME_BETWEEN_EACH_POLLING_DIARIZATION: "${VITE_APP_TIME_BETWEEN_EACH_POLLING_DIARIZATION}"
      VITE_APP_MAX_SPEAKERS_DIARIZATION: "${VITE_APP_MAX_SPEAKERS_DIARIZATION}"
    restart: unless-stopped